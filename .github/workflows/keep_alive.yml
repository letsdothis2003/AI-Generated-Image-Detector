name: Keep App Awake

on:
  schedule:
    # Runs every hour at minute 0
    - cron: "0 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -s https://ai-generated-image-detector-letsdothis2003.streamlit.app > /dev/null

          else
            echo "App response code was $STATUS. Wake-up signal sent."
          fi
